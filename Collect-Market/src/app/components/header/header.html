<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" >
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<div class="header">
  <div class="inner-header">
  
    <div class="logo-container" routerLink="/">
        <img src="pixel-art/ultraball.png" alt="Logo" class="logo-image">
      <h1>Collect<span>Market</span> </h1>
    </div>
    <ul class="navigation nav">
      <li class="nav-item">
        <a class="nav-link" routerLink="/shop">Tienda</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Vender</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Soporte</a>
      </li>
    </ul>

    <form id="header-form" action="/search" method="GET">
      <input type="text" name="search" placeholder="Buscar carta..." />
      <div id="search-icon" type="submit"><i class="fa-solid fa-magnifying-glass"></i></div>

    </form>

    @if (!user) { 
      <a id="login-button" routerLink="/auth/login">
        <i class="fa-solid fa-user-tie"></i> Iniciar Sesión
      </a>

      <a id="register-button" routerLink="/auth/register">
        <i class="fa-solid fa-user-tie"></i> Registrarse
      </a>
     } @else{ 
        <a id="login-button" routerLink="/user">
          <i class="fa-solid fa-user-tie"></i>
          {{user.name}}
        </a>
         <a id="fav-button" routerLink="/favorite">
    <i class="fa-solid fa-heart"></i>
  </a>
  <a id="cart-button" routerLink="/shopping-cart">
    <i class="fa-solid fa-cart-shopping"></i>
  </a>
         } 

  </div>

</div>
