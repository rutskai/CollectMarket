<div class="poke-card">
  <div class="img-wrap">
    <img [src]="imageUrl" [alt]="card.name" />
    @if (card.stock <= 2) {
      <span class="stock-low">¡Solo {{ card.stock }}!</span>
    }
  </div>

  <div class="card-info">
    <div class="price-rarity">
      <span class="rarity-badge">{{ card.rarity }}</span>
      <span class="card-price">€{{ card.price | number: '1.2-2' }}</span>
    </div>
    <div class="card-footer">
      <button class="btn-add" (click)="!isInCart && addToCart.emit(card)">
  @if (isInCart) {
    ✓ Añadido
  } @else {
    + Añadir
  }
</button>
      <button class="btn-fav" [class.active]="isFavorite" (click)="toggleFavorite.emit(card)">
        @if (isFavorite) {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#ffd700">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
            />
          </svg>
        } @else {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ffd700"
            stroke-width="2"
          >
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            />
          </svg>
        }
      </button>
    </div>
  </div>
</div>
