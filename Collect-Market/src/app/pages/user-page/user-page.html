<div id="user" class="video-bg">

  <div class="user-card">

    <!-- Avatar -->
    <div class="user-avatar-section">
      <div class="user-avatar-ring">
        <img src="user/Sprigatito.png" alt="Profile picture" />
      </div>
      <h2 class="user-name">{{ user?.name }}</h2>
      <span class="user-email">{{ user?.email }}</span>
    </div>

    <!-- Formulario -->
    <div class="user-form">
      <div class="user-field">
        <label>Nuevo nombre</label>
        <input type="text" placeholder="Escribe tu nuevo nombre..." />
      </div>

      <div class="user-field">
        <label>Foto de perfil</label>
        <input type="file" />
      </div>

      <button class="user-btn-primary" type="submit">Guardar cambios</button>
      <button class="user-btn-secondary" type="button" (click)="logout()">Cerrar sesión</button>
    </div>

  </div>

</div>
