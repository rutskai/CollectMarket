<div id="user" class="video-bg">
  <div class="user-card">

    <!-- Avatar -->
    <div class="user-avatar-section">
      <div class="user-avatar-ring">
        <img src="user/Sprigatito.png" alt="Profile picture" />
      </div>
      <h2 class="user-name">{{ user?.name }}</h2>
      <span class="user-email">{{ user?.email }}</span>
    </div>

    <!-- Menú -->
    <div class="user-menu">
      <a class="user-menu-item" routerLink="/sell">
        <div class="user-menu-info">
          <span class="user-menu-title">Vender cartas</span>
          <span class="user-menu-sub">Pon tus cartas a la venta</span>
        </div>
        <span class="user-menu-arrow">›</span>
      </a>

      <a class="user-menu-item" routerLink="/settings">
        <div class="user-menu-info">
          <span class="user-menu-title">Personalización</span>
          <span class="user-menu-sub">Cambia tu nombre y avatar</span>
        </div>
        <span class="user-menu-arrow">›</span>
      </a>

      <button class="user-menu-item user-menu-danger" (click)="logout()">
      
        <div class="user-menu-info">
          <span class="user-menu-title">Cerrar sesión</span>
          <span class="user-menu-sub">Hasta pronto</span>
        </div>
        <span class="user-menu-arrow">›</span>
      </button>
    </div>

  </div>
</div>
